name: Build Android APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Unzip Android project
        run: |
          test -f sharia_android_github_upload.zip
          rm -rf project
          mkdir project
          unzip -q sharia_android_github_upload.zip -d project
          ls -la project

      - name: Build debug APK
        working-directory: project
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharia-astro-debug-apk
          path: project/app/build/outputs/apk/debug/*.apk
